name: Create Pull Request

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "docs/**"
      - "chore/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    if: github.ref_name != 'main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          pr_url="$(
            gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --head "$BRANCH_NAME" \
              --base main \
              --state open \
              --json url \
              --jq '.[0].url // ""'
          )"

          if [ -z "$pr_url" ]; then
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$BRANCH_NAME" \
              --fill
          fi
