name: Enable Auto-Merge

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Enable auto-merge
        run: |
          if [ "$AUTO_MERGE_ENABLED" != "true" ]; then
            echo "::notice::Auto-merge is disabled. Set FOODBOT_ENABLE_AUTO_MERGE=true to enable it."
            exit 0
          fi

          if [ "$AUTOMATION_TOKEN_SET" != "true" ]; then
            echo "::notice::FOODBOT_AUTOMATION_TOKEN is not set; using GITHUB_TOKEN for auto-merge."
            echo "Add the secret before enabling deploy-on-main, so merge commits can trigger deployment workflows."
          fi

          gh pr merge "$PR_URL" --auto --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.FOODBOT_AUTOMATION_TOKEN || github.token }}
          AUTOMATION_TOKEN_SET: ${{ secrets.FOODBOT_AUTOMATION_TOKEN != '' }}
          AUTO_MERGE_ENABLED: ${{ vars.FOODBOT_ENABLE_AUTO_MERGE == 'true' }}
          PR_URL: ${{ github.event.pull_request.html_url }}
