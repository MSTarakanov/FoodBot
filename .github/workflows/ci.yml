name: CI

on:
  merge_group:
  pull_request:
  push:
    branches:
      - "main"
      - "feature/**"
      - "fix/**"
      - "docs/**"
      - "chore/**"

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Type style
        run: python scripts/check_type_style.py src

      - name: Mypy
        run: mypy src

      - name: Pytest
        run: pytest
